# Deploy Preview Workflow
#
# CURRENTLY DISABLED: This workflow requires the following GitHub secrets to be configured:
#   - VERCEL_TOKEN: Vercel authentication token
#   - VERCEL_ORG_ID: Vercel organization ID
#   - VERCEL_PROJECT_ID_BINGO: Project ID for Bingo app
#   - VERCEL_PROJECT_ID_TRIVIA: Project ID for Trivia app
#   - VERCEL_PROJECT_ID_PLATFORM_HUB: Project ID for Platform Hub app
#   - TURBO_TOKEN: Turborepo Remote Cache token
#
# To enable this workflow:
#   1. Configure all required secrets in GitHub repository settings
#   2. Change 'if: false' to 'if: true' (or remove the condition) in the deploy-preview job below
#
name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  deploy-preview:
    if: false  # Disabled - Vercel secrets not configured yet
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information (Bingo)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/bingo
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BINGO }}

      - name: Build Bingo (Vercel)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/bingo
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BINGO }}

      - name: Deploy Bingo to Preview
        id: deploy-bingo
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        working-directory: apps/bingo
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BINGO }}

      - name: Pull Vercel Environment Information (Trivia)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/trivia
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TRIVIA }}

      - name: Build Trivia (Vercel)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/trivia
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TRIVIA }}

      - name: Deploy Trivia to Preview
        id: deploy-trivia
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        working-directory: apps/trivia
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TRIVIA }}

      - name: Pull Vercel Environment Information (Platform Hub)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/platform-hub
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PLATFORM_HUB }}

      - name: Build Platform Hub (Vercel)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/platform-hub
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PLATFORM_HUB }}

      - name: Deploy Platform Hub to Preview
        id: deploy-hub
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        working-directory: apps/platform-hub
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PLATFORM_HUB }}

      - name: Comment on PR with Preview URLs
        uses: actions/github-script@v7
        env:
          BINGO_URL: ${{ steps.deploy-bingo.outputs.url }}
          TRIVIA_URL: ${{ steps.deploy-trivia.outputs.url }}
          HUB_URL: ${{ steps.deploy-hub.outputs.url }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          script: |
            const bingoUrl = process.env.BINGO_URL;
            const triviaUrl = process.env.TRIVIA_URL;
            const hubUrl = process.env.HUB_URL;
            const commitSha = process.env.COMMIT_SHA.substring(0, 7);

            const body = `## Preview Deployments

            | App | Preview URL |
            |-----|-------------|
            | Bingo | ${bingoUrl} |
            | Trivia | ${triviaUrl} |
            | Platform Hub | ${hubUrl} |

            ---
            _Deployed from commit ${commitSha}_`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## Preview Deployments')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
