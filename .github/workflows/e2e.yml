name: E2E Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build:
    name: Build Apps
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build-artifacts
          path: |
            apps/bingo/.next
            apps/trivia/.next
          retention-days: 1
          # .next is a dot-prefixed directory; upload-artifact@v4 skips hidden
          # files by default, so opt in or the artifact is empty.
          include-hidden-files: true

  e2e:
    name: E2E — Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm playwright install chromium --with-deps

      - name: Install Playwright system dependencies only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm playwright install-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: next-build-artifacts
          path: apps

      - name: Verify build artifact structure
        shell: bash
        run: |
          for app in bingo trivia; do
            if [ ! -d "apps/${app}/.next" ]; then
              echo "ERROR: apps/${app}/.next not found after artifact download"
              exit 1
            fi
          done
          echo "Build artifacts verified."

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        run: |
          pnpm playwright test \
            --project=bingo \
            --project=trivia
        env:
          CI: true
          SHARD: ${{ matrix.shard }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  e2e-summary:
    name: E2E Gate
    runs-on: ubuntu-latest
    needs: e2e
    if: always()

    steps:
      - name: Check E2E results
        env:
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          if [ "$E2E_RESULT" != "success" ]; then
            echo "E2E tests failed or were cancelled. PR cannot be merged."
            exit 1
          fi
          echo "All E2E shards passed."

  deploy:
    name: Deploy ${{ matrix.app }} to Vercel Production
    runs-on: ubuntu-latest
    needs: e2e-summary
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    # Serialize deploys per app so back-to-back merges to main always land
    # in commit order. Without this, run B's E2E could finish before run A's
    # and race the deploy, leaving prod on an older SHA.
    concurrency:
      group: vercel-deploy-${{ matrix.app }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: bingo
            project_id_secret: VERCEL_BINGO_PROJECT_ID
          - app: trivia
            project_id_secret: VERCEL_TRIVIA_PROJECT_ID

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        run: npx vercel@51.4.0 pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/${{ matrix.app }}

      - name: Build with Vercel
        run: npx vercel@51.4.0 build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/${{ matrix.app }}

      - name: Deploy prebuilt output to production
        run: npx vercel@51.4.0 deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/${{ matrix.app }}
