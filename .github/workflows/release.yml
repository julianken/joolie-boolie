name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  release:
    name: Build and Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      # Deploy Bingo to Production
      - name: Pull Vercel Environment Information (Bingo)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/bingo
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BINGO }}

      - name: Build Bingo (Vercel Production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/bingo
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BINGO }}

      - name: Deploy Bingo to Production
        id: deploy-bingo
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        working-directory: apps/bingo
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BINGO }}

      # Deploy Trivia to Production
      - name: Pull Vercel Environment Information (Trivia)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/trivia
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TRIVIA }}

      - name: Build Trivia (Vercel Production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/trivia
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TRIVIA }}

      - name: Deploy Trivia to Production
        id: deploy-trivia
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        working-directory: apps/trivia
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TRIVIA }}

      # Deploy Platform Hub to Production
      - name: Pull Vercel Environment Information (Platform Hub)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/platform-hub
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PLATFORM_HUB }}

      - name: Build Platform Hub (Vercel Production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/platform-hub
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PLATFORM_HUB }}

      - name: Deploy Platform Hub to Production
        id: deploy-hub
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        working-directory: apps/platform-hub
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PLATFORM_HUB }}

      # Create GitHub Release
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release, get all commits
            git log --pretty=format:"- %s (%h)" --no-merges > changelog.txt
          else
            # Get commits since last tag
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges > changelog.txt
          fi

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          BINGO_URL: ${{ steps.deploy-bingo.outputs.url }}
          TRIVIA_URL: ${{ steps.deploy-trivia.outputs.url }}
          HUB_URL: ${{ steps.deploy-hub.outputs.url }}
        with:
          script: |
            const fs = require('fs');
            const version = process.env.RELEASE_VERSION;
            const bingoUrl = process.env.BINGO_URL;
            const triviaUrl = process.env.TRIVIA_URL;
            const hubUrl = process.env.HUB_URL;

            let changelog = '';
            try {
              changelog = fs.readFileSync('changelog.txt', 'utf8');
            } catch (e) {
              changelog = 'No changes documented.';
            }

            const body = `## Beak Gaming Platform ${version}

            ### Deployed URLs

            | App | Production URL |
            |-----|----------------|
            | Bingo | ${bingoUrl} |
            | Trivia | ${triviaUrl} |
            | Platform Hub | ${hubUrl} |

            ### Changes

            ${changelog}
            `;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Beak Gaming Platform ${version}`,
              body: body,
              draft: false,
              prerelease: version.includes('-')
            });
